<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        #terminal {
            width: 100%;
            height: 100%;
        }
        /* 透明滚动条样式 */
        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = new Terminal({
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            fontSize: 12,  // 手机用较小字体
            lineHeight: 1.2,  // 紧凑行距
            letterSpacing: 0,
            theme: {
                background: '#000000',
                foreground: '#cccccc',
                cursor: '#ffffff',
                cursorAccent: '#000000',
                selection: 'rgba(255, 255, 255, 0.3)',
                black: '#000000',
                red: '#e06c75',
                green: '#98c379',
                yellow: '#d19a66',
                blue: '#61afef',
                magenta: '#c678dd',
                cyan: '#56b6c2',
                white: '#abb2bf'
            },
            cursorBlink: true,
            cursorStyle: 'block',
            scrollback: 5000,
            convertEol: true,  // 将 \n 转换为 \r\n
            allowScroll: true
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        // 通知 Android 终端尺寸
        function notifySize() {
            if (window.AndroidTerminal) {
                window.AndroidTerminal.onReady(term.cols, term.rows);
            }
        }

        // 初始通知
        setTimeout(notifySize, 100);

        // 窗口大小改变时重新调整
        window.addEventListener('resize', () => {
            fitAddon.fit();
            if (window.AndroidTerminal) {
                window.AndroidTerminal.onResize(term.cols, term.rows);
            }
        });

        // Base64 解码并写入
        window.writeToTerminalBase64 = function(base64Data) {
            try {
                const binaryString = atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const text = new TextDecoder('utf-8').decode(bytes);
                term.write(text);
            } catch (e) {
                console.error('Terminal write error:', e);
            }
        };

        window.clearTerminal = function() {
            term.clear();
        };

        // 获取终端尺寸
        window.getTerminalSize = function() {
            return JSON.stringify({ cols: term.cols, rows: term.rows });
        };

        // 滚动功能 - 在本地滚动缓冲区
        window.scrollTerminalUp = function(lines) {
            // 获取 viewport 元素并滚动
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.scrollTop -= (lines || 5) * 20; // 每次滚动几行
            }
        };

        window.scrollTerminalDown = function(lines) {
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.scrollTop += (lines || 5) * 20;
            }
        };

        window.scrollTerminalPageUp = function() {
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.scrollTop -= viewport.clientHeight * 0.8;
            }
        };

        window.scrollTerminalPageDown = function() {
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.scrollTop += viewport.clientHeight * 0.8;
            }
        };

        window.scrollTerminalToTop = function() {
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.scrollTop = 0;
            }
        };

        window.scrollTerminalToBottom = function() {
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.scrollTop = viewport.scrollHeight;
            }
        };

        // tmux 模式滚动 - 发送按键序列
        window.tmuxScrollUp = function() {
            // 发送 Ctrl+B [ 进入 copy mode，然后 k 向上
            term.write('\x02[k');  // Ctrl+B [ k
        };

        window.tmuxScrollDown = function() {
            term.write('\x02[j');  // Ctrl+B [ j
        };

        window.tmuxPageUp = function() {
            // Ctrl+B [ 然后 Ctrl+U (半页) 或 Ctrl+B (整页)
            term.write('\x02[\x15');  // Ctrl+B [ Ctrl+U
        };

        window.tmuxPageDown = function() {
            term.write('\x02[\x04');  // Ctrl+B [ Ctrl+D
        };

        window.tmuxEnterCopyMode = function() {
            term.write('\x02[');  // Ctrl+B [
        };

        window.tmuxExitCopyMode = function() {
            term.write('q');  // q 退出 copy mode
        };
    </script>
</body>
</html>
